<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Dashboard | Blue Waves</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body { background-color: #f8f9fa; color: #333; font-family: 'Inter', sans-serif;}
    .sidebar { min-height: 100vh; background-color: var(--dark-bg); color: white; padding-top: 20px;}
    .sidebar a { color: rgba(255,255,255,0.7); text-decoration: none; padding: 15px 20px; display: block; transition: 0.3s; }
    .sidebar a:hover, .sidebar a.active { background-color: var(--primary); color: white; }
    .content-area { padding: 40px; }
    .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .card-header { background-color: white; font-weight: 600; border-bottom: 1px solid #eee; padding: 15px 20px;}
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto;}
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar" style="width: 250px;">
      <h4 class="text-center mb-4 mt-3 text-white" style="font-family: 'Playfair Display', serif;">CMS Admin</h4>
      <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist" aria-orientation="vertical">
        <button class="nav-link text-start active" id="v-pills-slots-tab" data-bs-toggle="pill" data-bs-target="#v-pills-slots" type="button" role="tab" style="color: white;"><i class="bi bi-clock me-2"></i> Schedule Slots</button>
        <button class="nav-link text-start" id="v-pills-programs-tab" data-bs-toggle="pill" data-bs-target="#v-pills-programs" type="button" role="tab" style="color: white;"><i class="bi bi-journal-text me-2"></i> Programs</button>
        <button class="nav-link text-start" id="v-pills-memberships-tab" data-bs-toggle="pill" data-bs-target="#v-pills-memberships" type="button" role="tab" style="color: white;"><i class="bi bi-card-checklist me-2"></i> Memberships</button>
        <button class="nav-link text-start" id="v-pills-gallery-tab" data-bs-toggle="pill" data-bs-target="#v-pills-gallery" type="button" role="tab" style="color: white;"><i class="bi bi-images me-2"></i> Gallery</button>
      </div>
      <button id="logoutBtn" class="btn btn-outline-light m-3 position-absolute bottom-0" style="width: 200px;">Logout</button>
    </div>

    <!-- Content -->
    <div class="content-area flex-grow-1">
      <div class="tab-content" id="v-pills-tabContent">
        
        <!-- SLOTS TAB -->
        <div class="tab-pane fade show active" id="v-pills-slots" role="tabpanel">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Schedule Slots</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#slotModal" onclick="resetSlotForm()">+ Add Slot</button>
          </div>
          <div class="card">
            <div class="card-body">
              <table class="table table-hover">
                <thead><tr><th>Time</th><th>Name</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="slotsTableBody"><tr><td colspan="4"><div class="loader"></div></td></tr></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- PROGRAMS TAB -->
        <div class="tab-pane fade" id="v-pills-programs" role="tabpanel">
           <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Programs</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#programModal" onclick="resetProgramForm()">+ Add Program</button>
          </div>
          <div class="row" id="programsGrid"><div class="col-12"><div class="loader"></div></div></div>
        </div>

        <!-- MEMBERSHIPS TAB -->
        <div class="tab-pane fade" id="v-pills-memberships" role="tabpanel">
           <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Memberships</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#membershipModal" onclick="resetMembershipForm()">+ Add Membership</button>
          </div>
          <div class="row" id="membershipsGrid"><div class="col-12"><div class="loader"></div></div></div>
        </div>

        <!-- GALLERY TAB -->
        <div class="tab-pane fade" id="v-pills-gallery" role="tabpanel">
           <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gallery</h2>
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#galleryModal">+ Upload Image</button>
          </div>
          <div class="row g-3" id="galleryGrid"><div class="col-12"><div class="loader"></div></div></div>
        </div>

      </div>
    </div>
  </div>

  <!-- MODALS -->

  <!-- Slot Modal -->
  <div class="modal fade" id="slotModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="slotModalTitle">Add/Edit Slot</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="slotId">
        <div class="mb-3"><label>Time (e.g. 06:00 AM)</label><input type="text" class="form-control" id="slotTime"></div>
        <div class="mb-3"><label>Name</label><input type="text" class="form-control" id="slotName"></div>
        <div class="mb-3"><label>Status</label><select class="form-control" id="slotStatus"><option value="Open">Open</option><option value="Few Slots">Few Slots</option><option value="Full">Full</option></select></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-brand w-100" id="saveSlotBtn">Save Slot</button></div>
    </div></div>
  </div>

  <!-- Program Modal -->
  <div class="modal fade" id="programModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add/Edit Program</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="programId">
        <div class="mb-3"><label>Title</label><input type="text" class="form-control" id="progTitle"></div>
        <div class="mb-3"><label>Ages (e.g. Ages 16+)</label><input type="text" class="form-control" id="progAges"></div>
        <div class="mb-3"><label>Description</label><textarea class="form-control" id="progDesc" rows="3"></textarea></div>
        <div class="mb-3"><label>Image URL</label><input type="text" class="form-control" id="progImage" placeholder="https://..."></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-brand w-100" id="saveProgramBtn">Save Program</button></div>
    </div></div>
  </div>

  <!-- Membership Modal -->
  <div class="modal fade" id="membershipModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add/Edit Membership</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="membershipId">
        <div class="mb-3"><label>Tier Name (e.g. The Silver Wave)</label><input type="text" class="form-control" id="memName"></div>
        <div class="mb-3"><label>Subtitle</label><input type="text" class="form-control" id="memSub"></div>
        <div class="mb-3"><label>Price (e.g. ₹150)</label><input type="text" class="form-control" id="memPrice"></div>
        <div class="mb-3"><label>Unit (e.g. /mo or /hr)</label><input type="text" class="form-control" id="memUnit"></div>
        <div class="mb-3"><label>Is Most Popular?</label><input type="checkbox" class="form-check-input ms-2" id="memPopular"></div>
        <div class="mb-3"><label>Features (Comma separated)</label><textarea class="form-control" id="memFeatures" rows="3" placeholder="Unrestricted Swim, Standard Locker"></textarea></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-brand w-100" id="saveMembershipBtn">Save Membership</button></div>
    </div></div>
  </div>

  <!-- Gallery Modal -->
  <div class="modal fade" id="galleryModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Upload Image to Gallery</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="mb-3"><label>Select Image</label><input type="file" class="form-control" id="galleryFile" accept="image/*"></div>
        <div class="mb-3"><label>Alt Text (Description)</label><input type="text" class="form-control" id="galleryAlt"></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-brand w-100" id="uploadGalleryBtn">Upload</button></div>
    </div></div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/supabase-config.js';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Auth Check
    const { data: authData } = await supabase.auth.getSession();
    if (!authData.session) {
      window.location.href = 'admin-login.html';
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'admin-login.html';
    });

    // --- SLOTS LOGIC ---
    let slotModal = new bootstrap.Modal(document.getElementById('slotModal'));
    
    async function loadSlots() {
      const tbody = document.getElementById('slotsTableBody');
      try {
        const { data, error } = await supabase.from('slots').select('*').order('order_val');
        if(error) throw error;
        
        tbody.innerHTML = '';
        if(data.length === 0) tbody.innerHTML = '<tr><td colspan="4">No slots found.</td></tr>';
        
        data.forEach((item) => {
          tbody.innerHTML += `
            <tr>
              <td>${item.time}</td>
              <td>${item.name}</td>
              <td><span class="badge ${item.status === 'Open' ? 'bg-success' : item.status === 'Full' ? 'bg-danger' : 'bg-warning text-dark'}">${item.status}</span></td>
              <td>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteSlot(${item.id})">Delete</button>
              </td>
            </tr>
          `;
        });
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-danger">Error loading slots: '+e.message+'</td></tr>';
      }
    }

    document.getElementById('saveSlotBtn').addEventListener('click', async () => {
      const time = document.getElementById('slotTime').value;
      const name = document.getElementById('slotName').value;
      const status = document.getElementById('slotStatus').value;
      const btn = document.getElementById('saveSlotBtn');
      btn.innerText = "Saving...";
      
      try {
        const { error } = await supabase.from('slots').insert([{ time, name, status, order_val: Date.now() }]);
        if(error) throw error;
        slotModal.hide();
        loadSlots();
      } catch (e) { alert("Error: " + e.message); }
      btn.innerText = "Save Slot";
    });

    window.deleteSlot = async (id) => {
      if(confirm("Delete this slot?")) {
        await supabase.from('slots').delete().eq('id', id);
        loadSlots();
      }
    };
    window.resetSlotForm = () => {
      document.getElementById('slotTime').value = '';
      document.getElementById('slotName').value = '';
    };

    // --- PROGRAMS LOGIC ---
    let programModal = new bootstrap.Modal(document.getElementById('programModal'));
    async function loadPrograms() {
      const grid = document.getElementById('programsGrid');
      try {
        const { data, error } = await supabase.from('programs').select('*').order('order_val');
        if(error) throw error;
        
        grid.innerHTML = '';
        if(data.length === 0) grid.innerHTML = '<div class="col-12">No programs found.</div>';
        
        data.forEach((item) => {
          grid.innerHTML += `
            <div class="col-md-4 mb-3">
              <div class="card h-100">
                <img src="${item.image}" class="card-img-top" style="height: 150px; object-fit: cover;">
                <div class="card-body">
                  <h6 class="text-primary mb-1">${item.ages}</h6>
                  <h5 class="card-title">${item.title}</h5>
                  <button class="btn btn-sm btn-outline-danger w-100 mt-2" onclick="deleteProgram(${item.id})">Delete</button>
                </div>
              </div>
            </div>
          `;
        });
      } catch (e) { grid.innerHTML = '<div class="text-danger">Error: '+e.message+'</div>'; }
    }

    document.getElementById('saveProgramBtn').addEventListener('click', async () => {
      const title = document.getElementById('progTitle').value;
      const ages = document.getElementById('progAges').value;
      const desc = document.getElementById('progDesc').value;
      const image = document.getElementById('progImage').value || 'https://via.placeholder.com/800x500';
      const btn = document.getElementById('saveProgramBtn');
      btn.innerText = "Saving...";
      try {
        const { error } = await supabase.from('programs').insert([{ title, ages, desc, image, order_val: Date.now() }]);
        if(error) throw error;
        programModal.hide();
        loadPrograms();
      } catch (e) { alert("Error: " + e.message); }
      btn.innerText = "Save Program";
    });
    window.deleteProgram = async (id) => { if(confirm("Delete?")) { await supabase.from('programs').delete().eq('id', id); loadPrograms(); }};
    window.resetProgramForm = () => { document.getElementById('progTitle').value = ''; document.getElementById('progDesc').value=''; document.getElementById('progAges').value=''; document.getElementById('progImage').value=''; };

    // --- MEMBERSHIPS LOGIC ---
    let membershipModal = new bootstrap.Modal(document.getElementById('membershipModal'));
    async function loadMemberships() {
      const grid = document.getElementById('membershipsGrid');
      try {
        const { data, error } = await supabase.from('memberships').select('*').order('order_val');
        if(error) throw error;

        grid.innerHTML = '';
        if(data.length === 0) grid.innerHTML = '<div class="col-12">No memberships found.</div>';
        data.forEach((item) => {
          grid.innerHTML += `
            <div class="col-md-4 mb-3">
              <div class="card h-100 ${item.popular ? 'border-primary' : ''}">
                <div class="card-body text-center">
                  ${item.popular ? '<span class="badge bg-primary mb-2">Popular</span>' : ''}
                  <h5>${item.name}</h5>
                  <h2>${item.price}<small>${item.unit}</small></h2>
                  <button class="btn btn-sm btn-outline-danger w-100 mt-3" onclick="deleteMembership(${item.id})">Delete</button>
                </div>
              </div>
            </div>
          `;
        });
      } catch (e) { grid.innerHTML = '<div class="text-danger">Error: '+e.message+'</div>'; }
    }

    document.getElementById('saveMembershipBtn').addEventListener('click', async () => {
      const name = document.getElementById('memName').value;
      const subtitle = document.getElementById('memSub').value;
      const price = document.getElementById('memPrice').value;
      const unit = document.getElementById('memUnit').value;
      const popular = document.getElementById('memPopular').checked;
      
      // We will save features as a JSON array in Supabase. Wait, Supabase text fields can be tricky.
      // Let's just stringify the array or use Postgres JSONB. Since it's JS, JSON.stringify is easy.
      const featuresArr = document.getElementById('memFeatures').value.split(',').map(f => f.trim());
      const features = JSON.stringify(featuresArr);

      const btn = document.getElementById('saveMembershipBtn');
      btn.innerText = "Saving...";
      try {
        const { error } = await supabase.from('memberships').insert([{ name, subtitle, price, unit, popular, features, order_val: Date.now() }]);
        if(error) throw error;
        membershipModal.hide();
        loadMemberships();
      } catch (e) { alert("Error: " + e.message); }
      btn.innerText = "Save Membership";
    });
    window.deleteMembership = async (id) => { if(confirm("Delete?")) { await supabase.from('memberships').delete().eq('id', id); loadMemberships(); }};
    window.resetMembershipForm = () => { document.getElementById('memName').value = ''; document.getElementById('memPrice').value=''; document.getElementById('memFeatures').value=''; document.getElementById('memPopular').checked=false; };

    // --- GALLERY LOGIC ---
    let galleryModal = new bootstrap.Modal(document.getElementById('galleryModal'));
    async function loadGallery() {
      const grid = document.getElementById('galleryGrid');
      try {
        const { data, error } = await supabase.from('gallery').select('*').order('order_val');
        if(error) throw error;
        grid.innerHTML = '';
        if(data.length === 0) grid.innerHTML = '<div class="col-12">No images found.</div>';
        data.forEach((item) => {
          grid.innerHTML += `
            <div class="col-md-3">
              <div class="card">
                <img src="${item.url}" class="card-img-top" style="height:120px; object-fit:cover;">
                <div class="card-body p-2 text-center">
                  <button class="btn btn-sm btn-outline-danger" onclick="deleteGallery(${item.id})">Delete</button>
                </div>
              </div>
            </div>
          `;
        });
      } catch (e) { grid.innerHTML = '<div class="text-danger">Error: '+e.message+'</div>'; }
    }

    document.getElementById('uploadGalleryBtn').addEventListener('click', async () => {
      const file = document.getElementById('galleryFile').files[0];
      const alt = document.getElementById('galleryAlt').value;
      if(!file) return alert("Select a file first!");
      
      const btn = document.getElementById('uploadGalleryBtn');
      btn.innerText = "Uploading...";
      
      try {
        const fileName = Date.now() + '_' + file.name;
        // Upload to storage bucket "gallery"
        const { error: uploadError } = await supabase.storage.from('gallery').upload(fileName, file);
        if(uploadError) throw uploadError;

        // Get public URL
        const { data: publicUrlData } = supabase.storage.from('gallery').getPublicUrl(fileName);
        const url = publicUrlData.publicUrl;

        // Save to database table
        const { error: dbError } = await supabase.from('gallery').insert([{ url, alt, order_val: Date.now() }]);
        if(dbError) throw dbError;

        galleryModal.hide();
        loadGallery();
      } catch (e) { alert("Upload Error: " + e.message); }
      btn.innerText = "Upload";
      document.getElementById('galleryFile').value = '';
    });
    window.deleteGallery = async (id) => { if(confirm("Delete?")) { await supabase.from('gallery').delete().eq('id', id); loadGallery(); }};

    // Load initial data
    loadSlots();
    loadPrograms();
    loadMemberships();
    loadGallery();

  </script>
</body>
</html>
